<div class="banner" role="dialog" aria-modal="true" aria-label="Race winner">
  <div class="banner__card">
    <p class="banner__headline">Winner!</p>
    <p class="banner__name">{{ winnerName() }}</p>
    <p class="banner__time">Time: {{ winTime() }}s</p>
    <button type="button" class="btn btn--primary banner__btn" (click)="dismiss.emit()">OK</button>
  </div>
</div>
