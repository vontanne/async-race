<div class="car-card">
  <div class="car-card__header">
    <div class="car-card__actions">
      <button type="button" class="btn btn--sm" [disabled]="!canStart()" (click)="edit.emit(car())">
        Select
      </button>
      <button
        type="button"
        class="btn btn--sm btn--danger"
        [disabled]="!canStart()"
        (click)="remove.emit(car().id)"
      >
        Delete
      </button>
    </div>
    <span class="car-card__name">{{ car().name }}</span>
  </div>

  <div class="car-card__race-row">
    <div class="car-card__engine-btns">
      <button
        type="button"
        class="btn btn--engine"
        [disabled]="!canStart()"
        (click)="onStartEngine()"
        aria-label="Start engine"
        title="Start engine"
      >
        ▶
      </button>
      <button
        type="button"
        class="btn btn--engine"
        [disabled]="!canStop()"
        (click)="onStopEngine()"
        aria-label="Stop engine"
        title="Stop engine"
      >
        ■
      </button>
    </div>

    <div #track class="car-card__track">
      <div class="car-card__car">
        <app-car-icon [color]="car().color" />
      </div>
      <div class="car-card__finish" aria-hidden="true"></div>
    </div>
  </div>
</div>
