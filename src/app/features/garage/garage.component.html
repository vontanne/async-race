<section class="garage">
  <h1 class="garage__title">Garage ({{ totalCars() }})</h1>

  <div class="garage__panel">
    <div class="garage__form">
      <label class="visually-hidden" for="create-color">New car color</label>
      <input
        id="create-color"
        class="garage__color"
        type="color"
        [value]="state.createColor()"
        (input)="onCreateColorInput($event)"
      />
      <label class="visually-hidden" for="create-name">New car name</label>
      <input
        id="create-name"
        class="garage__input"
        type="text"
        placeholder="Car name"
        [value]="state.createName()"
        (input)="onCreateNameInput($event)"
        maxlength="50"
      />
      <button
        type="button"
        class="btn btn--primary"
        [disabled]="!isCreateValid()"
        (click)="onCreateCarClick()"
      >
        Add
      </button>
    </div>

    @if (state.editCar(); as editing) {
      <div class="garage__form">
        <label class="visually-hidden" for="edit-color">Edit car color</label>
        <input
          id="edit-color"
          class="garage__color"
          type="color"
          [value]="state.editColor()"
          (input)="onEditColorInput($event)"
        />
        <label class="visually-hidden" for="edit-name">Edit car name</label>
        <input
          id="edit-name"
          class="garage__input"
          type="text"
          placeholder="Car name"
          [value]="state.editName()"
          (input)="onEditNameInput($event)"
          maxlength="50"
        />
        <button
          type="button"
          class="btn btn--primary"
          [disabled]="!isEditValid()"
          (click)="onUpdateCarClick()"
        >
          Update
        </button>
        <button type="button" class="btn" (click)="onCancelEdit()">Cancel</button>
        <span class="garage__editing-hint">Editing {{ editing.name }}</span>
      </div>
    }
  </div>

  <div class="garage__race-controls">
    <button
      type="button"
      class="btn btn--primary"
      [disabled]="isRacing() || cars().length === 0"
      (click)="onStartRaceClick()"
    >
      Race
    </button>
    <button
      type="button"
      class="btn"
      [disabled]="!isRacing() && !hasFinishedRace()"
      (click)="onResetRace()"
    >
      Reset
    </button>
    <button type="button" class="btn" [disabled]="isGenerating()" (click)="onGenerateClick()">
      {{ isGenerating() ? 'Generating…' : 'Generate cars' }}
    </button>
  </div>

  <div class="garage__cars">
    @for (car of cars(); track car.id) {
      <app-car-card [car]="car" (edit)="onEditCar($event)" (remove)="onDeleteCarClick($event)" />
    } @empty {
      <p class="garage__empty">No cars in garage yet.</p>
    }
  </div>

  @if (cars().length > 0) {
    <app-pagination
      [currentPage]="state.page()"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />
  }
</section>

@if (winnerData(); as winner) {
  <app-winner-banner
    [winnerName]="winnerCarName()"
    [winTime]="winner.time"
    (dismiss)="winnerData.set(null)"
  />
}
