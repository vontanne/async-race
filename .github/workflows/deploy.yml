name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm test

      - run: npm run build -- --base-href=/async-race/

      - name: SPA 404 fallback + bypass Jekyll
        run: |
          cp dist/async-race/browser/index.html dist/async-race/browser/404.html
          touch dist/async-race/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/async-race/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
